<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>лицей.сеть</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
    <div id="authScreen">
      <div class="auth-box">
        <div class="auth-logo">лицей<span>.</span>сеть</div>
        <div class="auth-tagline">Школьная социальная сеть</div>
        <div class="auth-tabs">
          <button class="auth-tab active" id="authSwitchLogin">Войти</button>
          <button class="auth-tab" id="authSwitchRegister">Регистрация</button>
        </div>


        <div class="auth-form active" id="loginForm">
          <div class="form-group" style="margin: 0">
            <label class="form-label">Email</label>
            <input class="form-input" id="loginEmail" type="email" placeholder="you@lyceum.ru" />
          </div>
          <div class="form-group" style="margin: 0">
            <label class="form-label">Пароль</label>
            <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" />
          </div>
          <div class="auth-error" id="loginError"></div>
          <button class="auth-btn auth-btn-primary" id="loginBtn">Войти →</button>
        </div>

        
        <div class="auth-form" id="registerForm">
          <div>
            <label class="form-label">Я являюсь</label>
            <div class="role-picker">
              <div class="role-option selected" id="roleStudent">
                <div class="role-icon">🎒</div>
                <div class="role-label">Ученик</div>
                <div class="role-desc">Учусь в лицее</div>
              </div>
              <div class="role-option" id="roleTeacher">
                <div class="role-icon">👩‍🏫</div>
                <div class="role-label">Преподаватель</div>
                <div class="role-desc">Веду уроки</div>
              </div>
            </div>
          </div>
          <div class="form-group" style="margin: 0">
            <label class="form-label">Имя и фамилия</label>
            <input class="form-input" id="regName" placeholder="Артём Козлов" />
          </div>
          <div class="form-group" style="margin: 0">
            <label class="form-label">Email</label>
            <input class="form-input" id="regEmail" type="email" placeholder="you@lyceum.ru" />
          </div>
          <div class="form-group" style="margin: 0" id="classField">
            <label class="form-label">Класс</label>
            <div class="class-input-row">
              <input
                class="form-input"
                id="regClassNum"
                type="number"
                min="1"
                max="11"
                placeholder="10"
              />
              <input
                class="form-input"
                id="regClassLetter"
                maxlength="1"
                placeholder="А"
                style="text-transform: uppercase"
              />
            </div>
          </div>
          <div class="form-group" style="margin: 0; display: none" id="subjectField">
            <label class="form-label">Предмет(ы)</label>
            <input class="form-input" id="regSubject" placeholder="Математика, физика..." />
          </div>
          <div class="form-group" style="margin: 0">
            <label class="form-label">Пароль</label>
            <input
              class="form-input"
              id="regPassword"
              type="password"
              placeholder="Минимум 6 символов"
            />
          </div>
          <div class="auth-error" id="regError"></div>
          <button class="auth-btn auth-btn-primary" id="registerBtn">Зарегистрироваться →</button>
        </div>
      </div>
    </div>

    
    <nav class="sidebar">
      <div class="logo">лицей<span>.</span>сеть</div>
      <div class="nav-item active" data-tab="feed"><span class="nav-icon">🏠</span> Лента</div>
      <div class="nav-item" data-tab="events"><span class="nav-icon">📅</span> Мероприятия</div>
      <div class="nav-item" data-tab="groups"><span class="nav-icon">🎯</span> Группы</div>
      <div class="nav-item" data-tab="messages">
        <span class="nav-icon">💬</span> Сообщения
        <span class="badge" id="msgBadge" style="display: none">0</span>
      </div>

      <div class="sidebar-sep">
        <div class="sidebar-label">Мои группы</div>
      </div>
      <div id="myGroupsList"></div>

      <div class="user-card" style="margin-top: auto">
        <div class="avatar" id="sidebarAvatar" style="background: #7c6ef7; color: #fff">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Гость</div>
          <div class="user-role" id="sidebarRole">—</div>
        </div>
        <span
          style="color: var(--muted); font-size: 16px; cursor: pointer"
          id="logoutBtn"
          title="Выйти"
          >🚪</span
        >
      </div>
    </nav>

    
    <div class="main">
      <div class="tab-bar">
        <button class="tab active" data-tab="feed">Лента</button>
        <button class="tab" data-tab="events">Мероприятия</button>
        <button class="tab" data-tab="groups">Группы</button>
        <button class="tab" data-tab="messages">Сообщения</button>
      </div>

      
      <div class="panel active" id="panel-feed">
        <div class="feed-inner">
          <div class="composer">
            <div class="composer-top">
              <div class="avatar" id="composerAvatar" style="background: #7c6ef7; color: #fff">
                ?
              </div>
              <textarea
                class="composer-textarea"
                id="postText"
                placeholder="Что нового? Поделись с лицеем..."
              ></textarea>
            </div>
            <div class="composer-bottom">
              <div class="composer-left">
                <button class="btn btn-ghost btn-sm" id="fileBtn">📎 Файл</button>
                <select
                  class="form-select"
                  id="postGroup"
                  style="padding: 5px 10px; font-size: 12px; width: auto; border-radius: 8px"
                >
                  <option value="">📢 Общее</option>
                </select>
              </div>
              <button class="btn btn-primary btn-sm" id="publishBtn">Опубликовать →</button>
            </div>
          </div>
          <div id="postList"></div>
          <div id="feedPagination" class="pagination"></div>
        </div>
      </div>

      
      <div class="panel" id="panel-events">
        <div class="panel-content">
          <div class="panel-header">
            <div class="panel-title">📅 Мероприятия</div>
            <button class="btn btn-primary btn-sm" id="openEventModalBtn">
              + Создать мероприятие
            </button>
          </div>
          <div class="events-grid" id="eventsList"></div>
        </div>
      </div>

      
      <div class="panel" id="panel-groups">
        <div class="panel-content">
          <div class="panel-header">
            <div class="panel-title">🎯 Группы и кружки</div>
            <button class="btn btn-primary btn-sm" id="openGroupModalBtn">+ Создать группу</button>
          </div>
          <div class="groups-grid" id="groupsList"></div>
        </div>
      </div>

      
      <div class="panel" id="panel-messages">
        <div class="msg-list-col">
          <div class="msg-list-header">Сообщения</div>
          <div id="msgContactList"></div>
        </div>
        <div class="chat-col">
          <div class="chat-header">
            <div class="avatar" id="chatAvatar" style="background: #f7a86e; color: #000">МС</div>
            <div class="chat-header-info">
              <div class="chat-contact-name" id="chatName">—</div>
              <div class="chat-status" id="chatStatus"></div>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-row">
            <input class="chat-text-input" id="chatInput" placeholder="Напишите сообщение..." />
            <button class="send-btn" id="sendBtn">➤</button>
          </div>
        </div>
      </div>
    </div>

    
    <div class="modal-overlay" id="groupModal">
      <div class="modal">
        <div class="modal-title">🎯 Создать группу</div>
        <div class="form-group">
          <label class="form-label">Название группы</label>
          <input class="form-input" id="newGroupName" placeholder="Например: Шахматный клуб" />
        </div>
        <div class="form-group">
          <label class="form-label">Описание</label>
          <textarea
            class="form-textarea"
            id="newGroupDesc"
            placeholder="Чем занимается группа?"
          ></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Иконка (эмодзи)</label>
          <input
            class="form-input"
            id="newGroupIcon"
            placeholder="♟️"
            maxlength="4"
            style="font-size: 22px; text-align: center"
          />
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="closeGroupModalBtn">Отмена</button>
          <button class="btn btn-primary" id="createGroupBtn">Создать →</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="eventModal">
      <div class="modal">
        <div class="modal-title">📅 Создать мероприятие</div>
        <div class="form-group">
          <label class="form-label">Название</label>
          <input class="form-input" id="newEventTitle" placeholder="Название мероприятия" />
        </div>
        <div class="form-group">
          <label class="form-label">Описание</label>
          <textarea
            class="form-textarea"
            id="newEventDesc"
            placeholder="Расскажите подробности..."
          ></textarea>
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
          <div>
            <label class="form-label">Дата</label>
            <input class="form-input" id="newEventDate" type="date" />
          </div>
          <div>
            <label class="form-label">Место</label>
            <input class="form-input" id="newEventLocation" placeholder="Кабинет 204" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Группа / организатор</label>
          <select class="form-select" id="newEventGroup">
            <option value="Общелицейское">📢 Общелицейское</option>
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="closeEventModalBtn">Отмена</button>
          <button class="btn btn-primary" id="createEventBtn">Создать →</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    
    <script type="module" src="js/app.js"></script>
    <script src="tests.js"></script>
  </body>
</html>
